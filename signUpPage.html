<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UpConslt</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/pricingPage.css" />
    <link rel="stylesheet" href="css/servicesPage.css" />
    <link rel="stylesheet" href="css/signUpPage.css" />
  </head>
  <body>
    <div class="signup-section">
      <div class="signup-left">
        <img src="images/hero/hero.svg" alt="" />
      </div>
      <div class="signup-text">
        <h2>UpConsIt</h2>
        <h1>Sign up</h1>

        <form>
          <input type="text" placeholder="Name" required />
          <input type="tel" placeholder="Phone number" required />
          <input type="email" placeholder="Email" required />
          <div class="password-container">
            <input type="password" placeholder="Enter password" required />
            <span class="toggle-password"><img src="images/signUpPage/Vector (1).svg" alt=""></span>
          </div>

          <div class="options">
            <label> <input type="checkbox" /> Remember me </label>
            <a href="#">Forgot password?</a>
          </div>

          <button type="submit" class="btn-green">Sign in</button>

          <button type="button" class="btn-google">
            <img src="images/signUpPage/Group 3019.svg"/>
            Or sign in with Google
          </button>

          <p class="signup-text">
            Don’t have an account? <a href="logInPage.html">Sign up now</a>
          </p>
        </form>
      </div>
    </div>
    <script src="js/app.js"></script>
  </body>
</html>
